name: Build POS Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build POS
        working-directory: ./pos
        run: go build -o pdv.exe .

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: pdv-windows
          path: pos/pdv.exe
          retention-days: 7

      - name: Build Linux binary
        run: |
          cd pos
          GOOS=linux GOARCH=amd64 go build -o pdv-linux .
        shell: bash

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: pdv-linux
          path: pos/pdv-linux
          retention-days: 7
