<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} — Abarrotes PDV</title>
    <script src="https://unpkg.com/htmx.org@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; color: #1f2937; }
        nav { background: #1e3a5f; color: white; padding: 0 1rem; display: flex; align-items: center; height: 3.5rem; gap: 1.5rem; }
        nav a { color: rgba(255,255,255,.8); text-decoration: none; font-size: .9rem; padding: .25rem .5rem; border-radius: 4px; }
        nav a:hover, nav a.active { color: white; background: rgba(255,255,255,.15); }
        nav .brand { font-size: 1.2rem; font-weight: 700; color: white; margin-right: auto; }
        nav .badge { background: #ef4444; color: white; font-size: .7rem; padding: .15rem .4rem; border-radius: 999px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #374151; }
        .grid { display: grid; gap: 1rem; }
        .grid-2 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        .stat { text-align: center; padding: 1rem; }
        .stat .value { font-size: 1.8rem; font-weight: 700; color: #1e3a5f; }
        .stat .label { font-size: .8rem; color: #6b7280; margin-top: .25rem; }
        table { width: 100%; border-collapse: collapse; font-size: .9rem; }
        th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; color: #374151; }
        tr:hover { background: #f9fafb; }
        .btn { display: inline-block; padding: .5rem 1rem; border-radius: 6px; font-size: .875rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-primary:hover { background: #152d4a; }
        .btn-success { background: #059669; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #d97706; color: white; }
        .btn-sm { padding: .3rem .6rem; font-size: .8rem; }
        .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
        .btn-outline:hover { background: #f3f4f6; }
        input, select, textarea { padding: .5rem .75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: .875rem; width: 100%; }
        input:focus, select:focus { outline: 2px solid #1e3a5f; outline-offset: -1px; }
        label { display: block; font-size: .8rem; font-weight: 500; color: #374151; margin-bottom: .25rem; }
        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .alert { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .875rem; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .flex { display: flex; gap: .5rem; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-1 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 1rem; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .text-muted { color: #6b7280; font-size: .85rem; }
        .empty { text-align: center; color: #9ca3af; padding: 3rem 1rem; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal { background: white; border-radius: 8px; padding: 1.5rem; min-width: 400px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
        .search-box { display: flex; gap: .5rem; margin-bottom: 1rem; }
        .search-box input { flex: 1; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } nav { flex-wrap: wrap; height: auto; padding: .5rem; gap: .5rem; } }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Abarrotes PDV</span>
        <a href="/" class="{{if eq .Active "dashboard"}}active{{end}}">Dashboard</a>
        <a href="/ventas" class="{{if eq .Active "ventas"}}active{{end}}">Ventas</a>
        <a href="/productos" class="{{if eq .Active "productos"}}active{{end}}">Productos</a>
        <a href="/clientes" class="{{if eq .Active "clientes"}}active{{end}}">Clientes</a>
        <a href="/tickets" class="{{if eq .Active "tickets"}}active{{end}}">Tickets</a>
        <a href="/cajas" class="{{if eq .Active "cajas"}}active{{end}}">Caja{{if not .OperacionActiva}} <span class="badge">cerrada{{end}}</a>
        <a href="/proveedores" class="{{if eq .Active "proveedores"}}active{{end}}">Proveedores</a>
        <a href="/reportes" class="{{if eq .Active "reportes"}}active{{end}}">Reportes</a>
        <a href="/logout">Salir</a>
    </nav>
    <div class="container">
        {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
        {{if .Success}}<div class="alert alert-success">{{.Success}}</div>{{end}}
        {{block "content" .}}{{end}}
    </div>
    <script>
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail && e.detail.xhr) {
                var alert = document.querySelector('.alert-success, .alert-error');
                if (alert) setTimeout(function() { alert.remove(); }, 3000);
            }
        });
    </script>
</body>
</html>
