{{template "base.html" .}}
{{define "content"}}
<h1>Chat{{if eq .Role "admin"}} <button class="btn btn-sm btn-danger" onclick="limpiarChat()" style="float:right">Limpiar todo</button>{{end}}</h1>
<div class="chat-container">
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-bar">
        <button class="btn btn-icon" id="btn-camera" title="Camara" onclick="document.getElementById('file-camera').click()"><i class="fas fa-camera"></i></button>
        <input type="file" id="file-camera" accept="image/*;capture=camera" capture="environment" style="display:none" onchange="subirFoto(this)">
        <button class="btn btn-icon" id="btn-audio" title="Audio" onclick="grabarAudio()"><i class="fas fa-microphone"></i></button>
        <input type="text" id="chat-input" class="input" placeholder="Escribe un mensaje..." style="flex:1" onkeydown="if(event.key==='Enter')enviarTexto()">
        <button class="btn" onclick="enviarTexto()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>



<script>
var ws = null;
var chatUserId = {{.UserID}};
var chatRole = '{{.Role}}';
var audioRecorder = null;
var audioChunks = [];
var audioStart = 0;
var mediaStream = null;

function conectarWS(){
    var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto+'//'+window.location.host+'/api/chat/ws');
    ws.onmessage = function(e){
        var data = JSON.parse(e.data);
        if(data.action === 'delete'){
            var el = document.getElementById('msg-'+data.id);
            if(el) el.remove();
        } else if(data.action === 'clear'){
            document.getElementById('chat-messages').innerHTML = '';
        } else {
            agregarMensaje(data);
        }
    };
    ws.onclose = function(){ setTimeout(conectarWS, 3000); };
}

function agregarMensaje(msg){
    var container = document.getElementById('chat-messages');
    var esPropio = msg.usuario_id === chatUserId;
    var div = document.createElement('div');
    div.id = 'msg-'+msg.id;
    div.className = 'msg '+(esPropio?'msg-propio':'msg-otro');
    var inicial = msg.usuario_nombre ? msg.usuario_nombre.charAt(0).toUpperCase() : '?';
    var avatar = msg.usuario_foto ? '<img src="'+msg.usuario_foto+'" class="msg-avatar">' : '<span class="msg-avatar">'+inicial+'</span>';
    var borrar = chatRole === 'admin' ? '<span class="msg-borrar" onclick="borrarMensaje('+msg.id+')" title="Borrar mensaje">&times;</span>' : '';
    var html = '<div class="msg-header">'+borrar+avatar+'<span class="msg-nombre">'+escapeHtml(msg.usuario_nombre)+'</span></div>';
    if(msg.tipo === 'audio'){
        html += '<audio controls src="'+msg.archivo_ruta+'"></audio>';
        if(msg.duracion_segundos > 0) html += '<div class="msg-duracion">'+(msg.duracion_segundos).toFixed(1)+'s</div>';
    } else if(msg.tipo === 'imagen'){
        html += '<img src="'+msg.archivo_ruta+'" class="msg-img" onclick="window.open(this.src)" style="cursor:pointer;max-width:240px;border-radius:8px">';
    } else {
        html += '<div class="msg-texto">'+escapeHtml(msg.mensaje)+'</div>';
    }
    html += '<div class="msg-hora">'+formatearFecha(msg.created_on)+'</div>';
    div.innerHTML = html;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function enviarTexto(){
    var input = document.getElementById('chat-input');
    var texto = input.value.trim();
    if(!texto) return;
    input.value = '';
    fetch('/api/chat/upload', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mensaje:texto})
    });
}

function grabarAudio(){
    var btn = document.getElementById('btn-audio');
    if(audioRecorder && audioRecorder.state === 'recording'){
        audioRecorder.stop();
        btn.innerHTML = '<i class="fas fa-microphone"></i>';
        btn.classList.remove('grabando');
        return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        toast('Tu navegador no soporta grabacion de audio','error');
        return;
    }
    audioChunks = [];
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
        mediaStream = stream;
        audioRecorder = new MediaRecorder(stream, {mimeType:'audio/webm'});
        audioStart = Date.now();
        audioRecorder.ondataavailable = function(e){ if(e.data.size>0) audioChunks.push(e.data); };
        audioRecorder.onstop = function(){
            if(mediaStream) mediaStream.getTracks().forEach(function(t){t.stop();});
            var duracion = (Date.now() - audioStart) / 1000;
            var blob = new Blob(audioChunks, {type:'audio/webm'});
            var form = new FormData();
            form.append('archivo', blob, 'audio_'+Date.now()+'.webm');
            form.append('duracion', duracion.toString());
            fetch('/api/chat/upload', {method:'POST', body:form});
        };
        audioRecorder.start();
        btn.innerHTML = '<i class="fas fa-stop"></i>';
        btn.classList.add('grabando');
    }).catch(function(e){
        toast('Error al acceder al microfono: '+e.message,'error');
    });
}

function capturarCamara(){
    document.getElementById('file-camera').click();
}

function subirFoto(input){
    if(!input.files || !input.files[0]) return;
    var form = new FormData();
    form.append('archivo', input.files[0]);
    fetch('/api/chat/upload', {method:'POST', body:form});
    input.value = '';
}

function formatearFecha(f){
    if(!f) return '';
    var d = new Date(f);
    return d.toLocaleString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

function borrarMensaje(id){
    if(!confirm('Borrar este mensaje?')) return;
    fetch('/api/chat/messages/'+id, {method:'DELETE'}).then(function(r){
        if(!r.ok) toast('Error al borrar','error');
    });
}

function limpiarChat(){
    if(!confirm('Borrar TODOS los mensajes del chat?')) return;
    fetch('/api/chat/messages', {method:'DELETE'}).then(function(r){
        if(!r.ok) toast('Error al limpiar','error');
    });
}

function escapeHtml(t){
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

// Load existing messages
fetch('/api/chat/messages').then(function(r){return r.json();}).then(function(msgs){
    var container = document.getElementById('chat-messages');
    msgs.forEach(function(m){ agregarMensaje(m); });
    container.scrollTop = container.scrollHeight;
});

conectarWS();
</script>

<style>
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 160px);border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg2)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:75%;padding:8px 14px;border-radius:12px;font-size:14px;line-height:1.4}
.msg-propio{align-self:flex-end;background:var(--accent);color:#fff}
.msg-otro{align-self:flex-start;background:var(--bg);color:var(--text)}
.msg-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.msg-borrar{margin-left:auto;cursor:pointer;font-size:16px;line-height:1;opacity:.4;transition:opacity .15s;padding:0 4px;order:1}
.msg-borrar:hover{opacity:1}
.msg-propio .msg-borrar{color:rgba(255,255,255,.7)}
.msg-otro .msg-borrar{color:var(--text)}
.msg-avatar{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;object-fit:cover}
.msg-propio .msg-avatar{background:rgba(255,255,255,.25);color:#fff}
.msg-otro .msg-avatar{background:var(--accent);color:#fff}
.msg-nombre{font-size:12px;font-weight:600}
.msg-otro .msg-nombre{color:var(--text)}
.msg-propio .msg-nombre{color:rgba(255,255,255,.85)}
.msg-texto{word-break:break-word}
.msg-img{max-width:240px;border-radius:8px;display:block}
.msg-hora{font-size:10px;margin-top:3px;opacity:.5;text-align:right}
.msg-duracion{font-size:11px;margin-top:2px;opacity:.6}
.msg audio{max-width:220px;height:36px;display:block}
.chat-input-bar{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg2);align-items:center}
.btn-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:16px;color:var(--text)}
.btn-icon.grabando{background:#ef4444;color:#fff;border-color:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
{{end}}
