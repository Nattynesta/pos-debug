{{template "base.html" .}}
{{define "content"}}
<style>
.chat-container { display:flex; flex-direction:column; height:calc(100vh - 6rem); max-width:800px; margin:0 auto; }
.chat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; padding-bottom:.75rem; border-bottom:1px solid var(--border); }
.chat-header h2 { margin:0; font-size:1.1rem; }
.chat-header .online-count { font-size:.75rem; color:var(--text3); }
.chat-messages { flex:1; overflow-y:auto; padding:1rem; background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--radius); margin-bottom:1rem; display:flex; flex-direction:column; gap:.5rem; }
.chat-message { max-width:85%; animation:fadeIn .2s ease; }
.chat-message.own { align-self:flex-end; }
.chat-message.other { align-self:flex-start; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
.chat-message-bubble { padding:.5rem .75rem; border-radius:14px; font-size:.85rem; line-height:1.4; position:relative; }
.chat-message.own .chat-message-bubble { background:var(--accent); color:white; border-bottom-right-radius:4px; }
.chat-message.other .chat-message-bubble { background:var(--bg3); color:var(--text); border-bottom-left-radius:4px; border:1px solid var(--border); }
.chat-message-meta { display:flex; align-items:center; gap:.35rem; margin-top:.25rem; font-size:.65rem; color:var(--text3); }
.chat-message.own .chat-message-meta { justify-content:flex-end; }
.chat-message-avatar { width:20px; height:20px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:700; color:white; }
.chat-message-time { white-space:nowrap; }
.chat-input-wrap { display:flex; gap:.5rem; }
.chat-input-wrap input { flex:1; padding:.6rem .85rem; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--bg2); color:var(--text); font-size:.9rem; }
.chat-input-wrap input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.15); }
.chat-input-wrap button { padding:.6rem 1.2rem; font-size:.9rem; font-weight:600; }
.chat-empty { text-align:center; color:var(--text3); padding:3rem 1rem; font-size:.85rem; }
</style>

<div class="chat-container">
  <div class="chat-header">
    <h2><i class="ti ti-messages"></i> Chat General</h2>
    <span class="online-count" id="online-count">Cargando...</span>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty" id="chat-empty"><i class="ti ti-message-2" style="font-size:2rem;display:block;margin-bottom:.5rem;opacity:.3;"></i>Sin mensajes aún</div>
  </div>
  <div class="chat-input-wrap">
    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')enviarMensaje()" autocomplete="off">
    <button class="btn btn-primary" onclick="enviarMensaje()"><i class="ti ti-send"></i> Enviar</button>
  </div>
</div>

<script>
var currentUserId = {{.UserID}}, ws, msgId = 0, pending = {};

function formatTime(ts){
  var d = new Date(ts.replace(' ', 'T') + 'Z');
  return d.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone});
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMessage(m){
  var isOwn = m.user_id === currentUserId;
  var avatar = m.username.charAt(0).toUpperCase();
  return '<div class="chat-message '+(isOwn?'own':'other')+'">'+
    '<div class="chat-message-bubble">'+
      '<div>'+escapeHtml(m.message)+'</div>'+
      '<div class="chat-message-meta">'+
        '<span class="chat-message-avatar">'+avatar+'</span>'+
        '<span class="chat-message-user" style="font-weight:600;">'+escapeHtml(m.username)+'</span>'+
        '<span class="chat-message-time">'+formatTime(m.created)+'</span>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function appendMessage(m){
  var cont = document.getElementById('chat-messages');
  var empty = document.getElementById('chat-empty');
  empty.style.display = 'none';
  cont.insertAdjacentHTML('beforeend', renderMessage(m));
  cont.scrollTop = cont.scrollHeight;
}

function cargarMensajes(){
  fetch('/api/chat/mensajes').then(function(r){return r.json();}).then(function(msgs){
    var cont = document.getElementById('chat-messages');
    var empty = document.getElementById('chat-empty');
    if(!msgs.length){
      empty.style.display = 'block'; cont.innerHTML = ''; cont.appendChild(empty); return;
    }
    empty.style.display = 'none';
    cont.innerHTML = msgs.reverse().map(renderMessage).join('');
    cont.scrollTop = cont.scrollHeight;
  }).catch(function(){});
}

function enviarMensaje(){
  var input = document.getElementById('chat-input');
  var texto = input.value.trim();
  if(!texto || !ws || ws.readyState !== WebSocket.OPEN) return;
  input.value = '';
  var id = 'msg_' + (++msgId);
  ws.send(JSON.stringify({type:'chat', id:id, payload:texto}));
  pending[id] = texto;
}

function actualizarOnline(){
  fetch('/api/chat/online').then(function(r){return r.json();}).then(function(d){
    document.getElementById('online-count').textContent = d.count+' usuario'+(d.count!==1?'s':'')+' en línea';
  });
}

function conectarWS(){
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var session = document.cookie.split('; ').find(function(c){return c.startsWith('session=');});
  var token = session ? session.split('=')[1] : '';
  var url = proto + '//' + location.host + '/api/chat/ws';
  ws = new WebSocket(url);
  ws.onopen = function(){
    console.log('WS connected');
    if(token) ws.send(JSON.stringify({type:'auth', id:'auth_1', token:token}));
  };
  ws.onmessage = function(e){
    var m = JSON.parse(e.data);
    switch(m.type){
      case 'chat':
        appendMessage(m);
        if(m.id) ws.send(JSON.stringify({type:'ack', id:m.id, status:'received'}));
        break;
      case 'ack':
        delete pending[m.id];
        break;
      case 'error':
        console.warn('WS error:', m.error, m.id);
        break;
    }
  };
  ws.onclose = function(){
    setTimeout(conectarWS, 2000);
  };
  ws.onerror = function(){
    ws.close();
  };
}

cargarMensajes();
actualizarOnline();
conectarWS();
setInterval(function(){
  if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type:'ping', id:'ping_'+Date.now()}));
}, 25000);
setInterval(actualizarOnline, 30000);
window.addEventListener('beforeunload', function(){ if(ws) ws.close(); });
</script>
{{end}}
