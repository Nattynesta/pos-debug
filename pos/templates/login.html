<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abarrotes PDV — Iniciar Sesion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1e3a5f; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 12px; padding: 2.5rem; width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,.2); }
        .login-card h1 { text-align: center; margin-bottom: .5rem; font-size: 1.5rem; color: #1e3a5f; }
        .login-card p { text-align: center; color: #6b7280; margin-bottom: 1.5rem; font-size: .9rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: .8rem; font-weight: 500; color: #374151; margin-bottom: .25rem; }
        input { width: 100%; padding: .75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
        input:focus { outline: 2px solid #1e3a5f; }
        .btn { width: 100%; padding: .75rem; background: #1e3a5f; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: .5rem; }
        .btn:hover { background: #152d4a; }
        .alert-error { background: #fef2f2; color: #991b1b; padding: .75rem; border-radius: 6px; margin-bottom: 1rem; font-size: .875rem; text-align: center; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1><i class="fas fa-store"></i> Abarrotes PDV</h1>
        <p>Sistema de Punto de Venta</p>
        {{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required autofocus>
            </div>
            <div class="form-group">
                <label for="clave">Contraseña</label>
                <input type="password" id="clave" name="clave" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>
    </div>
</body>
</html>
