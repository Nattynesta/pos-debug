{{define "content"}}
<div class="flex-between mb-1">
    <h1>Proveedores</h1>
    <button class="btn btn-primary" onclick="mostrarFormProveedor()">+ Nuevo</button>
</div>
<div class="card">
    <table>
        <thead><tr><th>#</th><th>Nombre</th><th>Direccion</th><th>Telefonos</th><th>Acciones</th></tr></thead>
        <tbody id="prov-list"></tbody>
    </table>
</div>
<div id="provModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)cerrarModal()">
    <div class="modal">
        <h2 id="provModalTitle">Nuevo Proveedor</h2>
        <form onsubmit="return saveProv(event)">
            <input type="hidden" id="provId">
            <div class="form-group"><label>Nombre</label><input type="text" id="provNombre" required></div>
            <div class="form-group"><label>Direccion</label><input type="text" id="provDireccion"></div>
            <div class="form-group"><label>Telefonos</label><input type="text" id="provTelefonos"></div>
            <div class="flex"><button type="submit" class="btn btn-primary">Guardar</button> <button type="button" class="btn btn-outline" onclick="cerrarModal()">Cancelar</button></div>
        </form>
    </div>
</div>
<script>
function loadProveedores(){
    fetch('/api/proveedores').then(r=>r.json()).then(ps=>{
        var tbody = document.getElementById('prov-list');
        if(ps.length===0){ tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Sin proveedores</td></tr>'; return; }
        tbody.innerHTML = ps.map(function(p){ return '<tr><td>'+p.num+'</td><td>'+p.nombre+'</td><td>'+(p.direccion||'')+'</td><td>'+(p.telefonos||'')+'</td><td><button class="btn btn-sm btn-outline" onclick="editarProv('+p.num+')">Editar</button></td></tr>'; }).join('');
    });
}
function mostrarFormProveedor(){ document.getElementById('provModal').style.display='flex'; document.getElementById('provModalTitle').textContent='Nuevo Proveedor'; document.getElementById('provId').value=''; document.getElementById('provNombre').value=''; document.getElementById('provDireccion').value=''; document.getElementById('provTelefonos').value=''; }
function cerrarModal(){ document.getElementById('provModal').style.display='none'; }
function editarProv(num){
    fetch('/api/proveedores/'+num).then(r=>r.json()).then(function(p){
        document.getElementById('provModal').style.display='flex';
        document.getElementById('provModalTitle').textContent='Editar Proveedor';
        document.getElementById('provId').value=p.num;
        document.getElementById('provNombre').value=p.nombre;
        document.getElementById('provDireccion').value=p.direccion;
        document.getElementById('provTelefonos').value=p.telefonos;
    });
}
function saveProv(e){
    e.preventDefault();
    var id = document.getElementById('provId').value;
    var data = {nombre: document.getElementById('provNombre').value, direccion: document.getElementById('provDireccion').value, telefonos: document.getElementById('provTelefonos').value};
    var url = id ? '/api/proveedores/'+id : '/api/proveedores';
    var method = id ? 'PUT' : 'POST';
    fetch(url, {method:method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(function(r){ if(r.ok){ cerrarModal(); loadProveedores(); } else r.json().then(function(d){ alert('Error: '+d.error); }); });
    return false;
}
loadProveedores();
</script>
{{end}}
