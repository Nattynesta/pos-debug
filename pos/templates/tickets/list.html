{{template "base.html" .}}
{{define "content"}}
<div class="flex-between mb-1">
    <h1>Tickets</h1>
</div>
<div class="card mb-1">
    <div class="search-box" style="flex-wrap:wrap; gap:.5rem;">
        <input type="text" id="search" placeholder="Buscar folio, cliente, local..." oninput="aplicarFiltros()" style="flex:1; min-width:200px;">
        <select id="filtro-estado" onchange="aplicarFiltros()">
            <option value="">Todos los estados</option>
            <option value="abierto">Abierto</option>
            <option value="pagado">Pagado</option>
            <option value="cancelado">Cancelado</option>
            <option value="credito">Crédito</option>
        </select>
        <select id="filtro-prioridad" onchange="aplicarFiltros()">
            <option value="">Todas prioridades</option>
            <option value="1">Baja (1)</option>
            <option value="2">Normal (2)</option>
            <option value="3">Alta (3)</option>
            <option value="4">Urgente (4)</option>
        </select>
        <label style="display:flex; align-items:center; gap:.3rem; cursor:pointer;">
            <input type="checkbox" id="filtro-adeudos" onchange="aplicarFiltros()"> Solo adeudos
        </label>
        <button class="btn btn-outline" onclick="limpiarFiltros()"><i class="fas fa-eraser"></i> Limpiar</button>
    </div>
</div>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Folio</th>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Local</th>
                <th>Total</th>
                <th>Pagado</th>
                <th>Adeudo</th>
                <th>Art.</th>
                <th>Estado</th>
                <th>Prioridad</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tickets-list"></tbody>
    </table>
</div>
<script>
function aplicarFiltros(){
    var q = document.getElementById('search').value;
    var estado = document.getElementById('filtro-estado').value;
    var prioridad = document.getElementById('filtro-prioridad').value;
    var soloAdeudos = document.getElementById('filtro-adeudos').checked ? '1' : '';
    var params = new URLSearchParams();
    if(q) params.set('q', q);
    if(estado) params.set('estado', estado);
    if(prioridad) params.set('prioridad', prioridad);
    if(soloAdeudos) params.set('solo_adeudos', soloAdeudos);
    fetch('/api/tickets?'+params.toString()).then(r=>r.json()).then(ts=>{
        var tbody = document.getElementById('tickets-list');
        if(ts.length===0){ tbody.innerHTML = '<tr><td colspan="12" class="text-center text-muted">Sin tickets</td></tr>'; return; }
        tbody.innerHTML = ts.map(function(t){
            var esCredito = t.forma_pago==='c' && t.esta_cancelado!=='t';
            var estadoTxt = t.esta_cancelado==='t' ? 'Cancelado' : (t.esta_abierto==='t' ? 'Abierto' : (esCredito ? 'Crédito' : 'Pagado'));
            var estadoCls = t.esta_cancelado==='t' ? 'text-muted' : (t.esta_abierto==='t' ? 'text-warning' : (esCredito ? 'text-danger' : 'text-success'));
            var prioridadTxt = t.prioridad > 0 ? t.prioridad : '-';
            var prioridadCls = t.prioridad >= 3 ? 'text-danger' : (t.prioridad >= 2 ? 'text-warning' : '');
            var pagado = t.pago_con || 0;
            var adeudo = t.total - pagado;
            return '<tr>'+
                '<td>'+t.id+'</td>'+
                '<td>'+(t.folio||'-')+'</td>'+
                '<td>'+(t.creado_en||'')+'</td>'+
                '<td>'+(t.cliente_nombre||'-')+'</td>'+
                '<td>'+(t.cliente_direccion||'-')+'</td>'+
                '<td>$'+t.total.toFixed(2)+'</td>'+
                '<td>$'+pagado.toFixed(2)+'</td>'+
                '<td class="'+(adeudo>0?'text-danger':'text-success')+'">$'+adeudo.toFixed(2)+'</td>'+
                '<td>'+(t.numero_articulos||0)+'</td>'+
                '<td class="'+estadoCls+'">'+estadoTxt+'</td>'+
                '<td class="'+prioridadCls+'">'+prioridadTxt+'</td>'+
                '<td><a href="/tickets/'+t.id+'" class="btn btn-sm btn-outline"><i class="fas fa-eye"></i> Ver</a></td>'+
            '</tr>';
        }).join('');
    });
}
function limpiarFiltros(){
    document.getElementById('search').value = '';
    document.getElementById('filtro-estado').value = '';
    document.getElementById('filtro-prioridad').value = '';
    document.getElementById('filtro-adeudos').checked = false;
    aplicarFiltros();
}
aplicarFiltros();
</script>
{{end}}
