{{template "base.html" .}}
{{define "content"}}
<style>
.user-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.user-toolbar h1 { margin:0; font-size:1.3rem; }
.user-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:.75rem; }
.user-card { background:white; border-radius:10px; padding:1rem; box-shadow:0 1px 3px rgba(0,0,0,.08); border:1.5px solid #e5e7eb; }
.user-card .uc-header { display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem; }
.user-card .uc-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem; color:white; flex-shrink:0; }
.user-card .uc-name { font-weight:600; font-size:.95rem; }
.user-card .uc-user { font-size:.8rem; color:#6b7280; }
.user-card .uc-detail { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.75rem; }
.user-card .uc-badge { font-size:.7rem; padding:.2rem .5rem; border-radius:999px; background:#f3f4f6; color:#6b7280; }
.user-card .uc-badge.admin { background:#e8effd; color:#1a56db; }
.user-card .uc-badge.inactive { background:#fee2e2; color:#dc2626; }
.user-card .uc-actions { display:flex; gap:.4rem; flex-wrap:wrap; }
.pw-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
.pw-modal.open { display:flex; }
.pw-content { background:white; border-radius:14px; padding:1.5rem; width:90%; max-width:380px; box-shadow:0 10px 40px rgba(0,0,0,.15); }
.pw-content h3 { margin:0 0 1rem; }
.pw-field { margin-bottom:.75rem; }
.pw-field label { display:block; font-size:.8rem; font-weight:600; color:#4b5563; margin-bottom:.3rem; }
.pw-field input { width:100%; padding:.55rem .7rem; border:1.5px solid #e5e7eb; border-radius:8px; font-size:.9rem; box-sizing:border-box; }
.pw-field input:focus { outline:none; border-color:#1a56db; box-shadow:0 0 0 3px rgba(26,86,219,.1); }
.pw-actions { display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem; }
</style>

<div class="user-toolbar">
  <h1><i class="ti ti-users"></i> Usuarios</h1>
  <button class="btn btn-primary" onclick="mostrarFormUsuario()"><i class="ti ti-plus"></i> Nuevo</button>
</div>
<div class="user-grid" id="usuarios-grid"></div>

<div id="userModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)cerrarModal()">
  <div class="modal" style="max-width:480px;">
    <h2 id="userModalTitle">Nuevo Usuario</h2>
    <form onsubmit="return saveUser(event)">
      <input type="hidden" id="userId">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div id="userFotoPreview" style="width:64px;height:64px;border-radius:50%;overflow:hidden;background:#f3f4f6;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#9ca3af;border:2px dashed #d1d5db;background-size:cover;background-position:center"></div>
        <div>
          <button type="button" class="btn btn-sm btn-outline" onclick="document.getElementById('userFotoInput').click()"><i class="ti ti-camera"></i> Foto</button>
          <input type="file" id="userFotoInput" accept="image/*" style="display:none" onchange="subirFotoUsuario(event)">
          <div style="font-size:.75rem;color:#9ca3af;margin-top:4px">PNG, JPG. Max 5MB</div>
        </div>
      </div>
      <div class="form-group"><label>Usuario *</label><input type="text" id="userUsuario" required></div>
      <div class="form-group"><label>Nombre Completo</label><input type="text" id="userNombre"></div>
      <div class="form-row">
        <div class="form-group"><label>Teléfono</label><input type="text" id="userTelefono"></div>
        <div class="form-group"><label>Correo</label><input type="email" id="userCorreo"></div>
      </div>
      <div class="form-group"><label>Dirección</label><input type="text" id="userDireccion"></div>
      <div class="form-group"><label>Rol</label><select id="userRol"><option value="helper">Helper</option><option value="admin">Admin</option></select></div>
      <div class="form-group" id="pw-field-group"><label>Contraseña <span style="color:var(--gray-400);font-weight:400;">(solo para nuevo usuario)</span></label><input type="password" id="userClave" placeholder="Mínimo 4 caracteres"></div>
      <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="userActivo" checked> Activo</label></div>
      <div class="flex" style="gap:.5rem;flex-wrap:wrap;">
        <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Guardar</button>
        <button type="button" class="btn btn-outline" onclick="cerrarModal()"><i class="ti ti-x"></i> Cancelar</button>
      </div>
    </form>
  </div>
</div>

<div class="pw-modal" id="pwModal">
  <div class="pw-content">
    <h3><i class="ti ti-key"></i> Cambiar Contraseña</h3>
    <p style="font-size:.85rem;color:#6b7280;margin-bottom:1rem;" id="pw-user-label">Usuario: <strong></strong></p>
    <input type="hidden" id="pw-user-id">
    <div class="pw-field">
      <label>Nueva Contraseña</label>
      <input type="password" id="pw-clave" placeholder="Mínimo 4 caracteres" oninput="validarPw()">
    </div>
    <div class="pw-field">
      <label>Confirmar Contraseña</label>
      <input type="password" id="pw-clave2" placeholder="Repite la contraseña" oninput="validarPw()">
    </div>
    <p id="pw-error" style="color:#dc2626;font-size:.8rem;display:none;"></p>
    <div class="pw-actions">
      <button class="btn btn-outline" onclick="cerrarPwModal()">Cancelar</button>
      <button class="btn btn-primary" id="pw-save-btn" onclick="guardarPassword()" disabled><i class="ti ti-device-floppy"></i> Guardar</button>
    </div>
  </div>
</div>

<script>
function loadUsuarios(){
  fetch('/api/usuarios').then(function(r){return r.json()}).then(function(us){
    var grid = document.getElementById('usuarios-grid');
    if(us.length===0){ grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#9ca3af;">Sin usuarios</div>'; return; }
    grid.innerHTML = us.map(function(u){
      var initials = (u.nombre_completo||u.usuario||'?').charAt(0).toUpperCase();
      var color = COLORS[u.id % COLORS.length];
      var rolBadge = u.rol==='admin' ? 'admin' : '';
      var activeBadge = u.activo!=='t' ? '<span class="uc-badge inactive">Inactivo</span>' : '';
      return '<div class="user-card">'+
        '<div class="uc-header">'+
          (u.foto ? '<img src="'+u.foto+'" class="uc-avatar" style="object-fit:cover">' : '<div class="uc-avatar" style="background:'+color+'">'+initials+'</div>')+
          '<div><div class="uc-name">'+(u.nombre_completo||'Sin nombre')+'</div><div class="uc-user">@'+u.usuario+'</div></div>'+
        '</div>'+
        '<div class="uc-detail">'+
          '<span class="uc-badge '+rolBadge+'">'+(u.rol||'helper')+'</span>'+
          (u.correo ? '<span class="uc-badge">'+u.correo+'</span>' : '')+
          (u.telefono ? '<span class="uc-badge">'+u.telefono+'</span>' : '')+
          activeBadge+
        '</div>'+
        '<div class="uc-actions">'+
          '<button class="btn btn-sm btn-outline" onclick="editarUser('+u.id+')"><i class="ti ti-edit"></i> Editar</button>'+
          '<button class="btn btn-sm btn-outline" onclick="mostrarPwModal('+u.id+',\''+(u.usuario||'').replace(/'/g,"\\'")+'\')"><i class="ti ti-key"></i> Contraseña</button>'+
        '</div></div>';
    }).join('');
  });
}

var COLORS = ['#1a56db','#059669','#d97706','#7c3aed','#0891b2','#be123c','#15803d','#b45309','#1d4ed8','#9333ea'];

function mostrarFormUsuario(){
  document.getElementById('userModal').style.display='flex';
  document.getElementById('userModalTitle').textContent='Nuevo Usuario';
  ['userId','userUsuario','userNombre','userTelefono','userCorreo','userDireccion','userClave'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('userRol').value='helper';
  document.getElementById('userActivo').checked=true;
  document.getElementById('pw-field-group').style.display='block';
  var preview = document.getElementById('userFotoPreview');
  preview.style.backgroundImage = '';
  preview.textContent = '?';
  preview.style.border = '2px dashed #d1d5db';
}
function cerrarModal(){ document.getElementById('userModal').style.display='none'; }

function editarUser(id){
  fetch('/api/usuarios').then(function(r){return r.json()}).then(function(us){
    var u = us.find(function(x){ return x.id===id; });
    if(!u) return;
    document.getElementById('userModal').style.display='flex';
    document.getElementById('userModalTitle').textContent='Editar Usuario';
    document.getElementById('userId').value=u.id;
    document.getElementById('userUsuario').value=u.usuario;
    document.getElementById('userNombre').value=u.nombre_completo||'';
    document.getElementById('userTelefono').value=u.telefono||'';
    document.getElementById('userCorreo').value=u.correo||'';
    document.getElementById('userDireccion').value=u.direccion||'';
    document.getElementById('userRol').value=u.rol||'helper';
    document.getElementById('userActivo').checked = u.activo==='t';
    document.getElementById('pw-field-group').style.display='none';
    var preview = document.getElementById('userFotoPreview');
    if(u.foto){
      preview.style.backgroundImage = 'url('+u.foto+')';
      preview.textContent = '';
      preview.style.border = 'none';
    } else {
      preview.style.backgroundImage = '';
      preview.textContent = (u.nombre_completo||u.usuario||'?').charAt(0).toUpperCase();
      preview.style.border = '2px dashed #d1d5db';
    }
  });
}

function saveUser(e){
  e.preventDefault();
  var id = document.getElementById('userId').value;
  var data = {
    usuario: document.getElementById('userUsuario').value,
    nombre_completo: document.getElementById('userNombre').value,
    telefono: document.getElementById('userTelefono').value,
    correo: document.getElementById('userCorreo').value,
    direccion: document.getElementById('userDireccion').value,
    rol: document.getElementById('userRol').value,
    activo: document.getElementById('userActivo').checked ? 't' : 'f'
  };
  if(!id){
    data.clave = document.getElementById('userClave').value || data.usuario;
  }
  var url = id ? '/api/usuarios/'+id : '/api/usuarios';
  var method = id ? 'PUT' : 'POST';
  fetch(url, {method:method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
  .then(function(r){ if(r.ok){ cerrarModal(); loadUsuarios(); } else r.json().then(function(d){ alert('Error: '+d.error); }); });
  return false;
}

function subirFotoUsuario(e){
  var file = e.target.files && e.target.files[0];
  if(!file) return;
  var id = document.getElementById('userId').value;
  if(!id){ alert('Guarda el usuario primero antes de agregar foto'); return; }
  var form = new FormData();
  form.append('foto', file);
  fetch('/api/usuarios/'+id+'/foto', {method:'POST', body:form})
  .then(function(r){
    if(r.ok){
      var preview = document.getElementById('userFotoPreview');
      preview.style.backgroundImage = 'url('+URL.createObjectURL(file)+')';
      preview.textContent = '';
      preview.style.border = 'none';
      loadUsuarios();
    } else { alert('Error al subir foto'); }
  });
}

function mostrarPwModal(id, usuario){
  document.getElementById('pw-user-id').value = id;
  document.getElementById('pw-user-label').querySelector('strong').textContent = usuario;
  document.getElementById('pw-clave').value = '';
  document.getElementById('pw-clave2').value = '';
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-save-btn').disabled = true;
  document.getElementById('pwModal').classList.add('open');
}

function cerrarPwModal(){ document.getElementById('pwModal').classList.remove('open'); }

function validarPw(){
  var c1 = document.getElementById('pw-clave').value;
  var c2 = document.getElementById('pw-clave2').value;
  var err = document.getElementById('pw-error');
  var btn = document.getElementById('pw-save-btn');
  if(!c1 || c1.length < 4){ err.textContent = 'Mínimo 4 caracteres'; err.style.display = 'block'; btn.disabled = true; return; }
  if(c1 !== c2){ err.textContent = 'Las contraseñas no coinciden'; err.style.display = 'block'; btn.disabled = true; return; }
  err.style.display = 'none';
  btn.disabled = false;
}

function guardarPassword(){
  var id = document.getElementById('pw-user-id').value;
  var clave = document.getElementById('pw-clave').value;
  if(!id || !clave || clave.length < 4) return;
  fetch('/api/usuarios/'+id+'/password', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({clave:clave})
  }).then(function(r){
    if(r.ok){ cerrarPwModal(); alert('Contraseña actualizada'); }
    else r.json().then(function(d){ alert('Error: '+d.error); });
  });
}

document.getElementById('pwModal').addEventListener('click', function(e){ if(e.target===this) cerrarPwModal(); });
loadUsuarios();
</script>
{{end}}
